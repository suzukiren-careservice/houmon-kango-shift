<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>訪問看護ステーション</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/vue@3/dist/vue.global.prod.js"></script>
  <script src="config.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --primary:  #2563EB;
      --teal:     #0D9488;
      --text:     #0F172A;
      --sub:      #64748B;
      --border:   #E2E8F0;
      --bg:       #F8FAFC;
      --card:     #FFFFFF;
      --shadow:   0 1px 3px rgba(0,0,0,0.06), 0 8px 24px rgba(0,0,0,0.07);
      --shadow-sm:0 1px 2px rgba(0,0,0,0.05), 0 2px 8px rgba(0,0,0,0.05);
      --radius:   18px;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Sans', 'Yu Gothic UI', sans-serif;
      background: var(--bg);
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      padding: 32px 20px;
    }

    /* 背景の装飾 */
    body::before {
      content: '';
      position: fixed; top: -200px; right: -200px;
      width: 700px; height: 700px; border-radius: 50%;
      background: radial-gradient(circle, rgba(37,99,235,0.06) 0%, transparent 65%);
      pointer-events: none;
    }
    body::after {
      content: '';
      position: fixed; bottom: -200px; left: -200px;
      width: 600px; height: 600px; border-radius: 50%;
      background: radial-gradient(circle, rgba(13,148,136,0.05) 0%, transparent 65%);
      pointer-events: none;
    }

    #app { width: 100%; max-width: 390px; position: relative; z-index: 1; }

    /* ══════════════════════════
       共通パーツ
    ══════════════════════════ */
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
    }
    .btn-primary {
      width: 100%; padding: 15px;
      border-radius: 13px; border: none;
      background: linear-gradient(135deg, var(--primary), var(--teal));
      color: #fff; font-size: 15px; font-weight: 700;
      letter-spacing: 0.5px; cursor: pointer;
      transition: opacity 0.18s, transform 0.12s;
      box-shadow: 0 4px 14px rgba(37,99,235,0.25);
    }
    .btn-primary:active { opacity: 0.88; transform: scale(0.99); }

    .field {
      width: 100%; padding: 14px 16px;
      border: 1.5px solid var(--border);
      border-radius: 12px; background: #fff;
      font-size: 15px; color: var(--text); outline: none;
      transition: border-color 0.18s, box-shadow 0.18s;
    }
    .field:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(37,99,235,0.08);
    }
    .field::placeholder { color: #CBD5E1; }

    /* ══════════════════════════
       パスワード画面
    ══════════════════════════ */
    .pwd-screen { text-align: center; }

    .logo { margin-bottom: 40px; }
    .logo-badge {
      display: inline-flex; align-items: center; gap: 6px;
      background: linear-gradient(135deg, rgba(37,99,235,0.08), rgba(13,148,136,0.08));
      border: 1px solid rgba(37,99,235,0.15);
      border-radius: 100px; padding: 6px 14px;
      margin-bottom: 16px;
    }
    .logo-dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: linear-gradient(135deg, var(--primary), var(--teal));
    }
    .logo-label {
      font-size: 11px; font-weight: 700; letter-spacing: 2px;
      color: var(--primary); text-transform: uppercase;
    }
    .logo-title {
      font-size: 28px; font-weight: 800;
      color: var(--text); letter-spacing: -0.5px;
      line-height: 1.2;
    }
    .logo-title em {
      font-style: normal;
      background: linear-gradient(135deg, var(--primary), var(--teal));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }

    .pwd-card { padding: 32px 28px; text-align: left; margin-bottom: 0; }
    .pwd-card-label {
      font-size: 13px; font-weight: 600; color: var(--sub);
      letter-spacing: 0.3px; margin-bottom: 8px; display: block;
    }
    .pwd-error {
      font-size: 12px; color: #EF4444;
      margin-top: 6px; margin-bottom: 0;
      display: flex; align-items: center; gap: 4px;
    }
    .pwd-submit { margin-top: 16px; }

    /* ══════════════════════════
       アプリ一覧
    ══════════════════════════ */
    .page-head { margin-bottom: 28px; }
    .page-eyebrow {
      display: inline-flex; align-items: center; gap: 6px;
      background: rgba(37,99,235,0.07);
      border: 1px solid rgba(37,99,235,0.12);
      border-radius: 100px; padding: 5px 12px;
      margin-bottom: 14px;
    }
    .eyebrow-dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: linear-gradient(135deg, var(--primary), var(--teal));
    }
    .eyebrow-text {
      font-size: 10px; font-weight: 700; letter-spacing: 2px;
      color: var(--primary); text-transform: uppercase;
    }
    .page-title {
      font-size: 26px; font-weight: 800;
      color: var(--text); letter-spacing: -0.3px; line-height: 1.25;
    }
    .page-title em {
      font-style: normal;
      background: linear-gradient(135deg, var(--primary), var(--teal));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }

    .app-list { display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; }

    .app-card {
      display: flex; align-items: center; gap: 15px;
      padding: 17px 18px;
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: 16px; text-decoration: none;
      box-shadow: var(--shadow-sm);
      transition: all 0.18s;
      position: relative; overflow: hidden;
    }
    .app-card::after {
      content: '';
      position: absolute; left: 0; top: 0; bottom: 0;
      width: 4px; border-radius: 16px 0 0 16px;
    }
    .app-card.shift::after  { background: linear-gradient(180deg, #2563EB, #60A5FA); }
    .app-card.incident::after { background: linear-gradient(180deg, #0D9488, #34D399); }
    .app-card:hover {
      border-color: transparent;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
      transform: translateY(-1px);
    }
    .app-icon {
      width: 46px; height: 46px; border-radius: 13px;
      display: flex; align-items: center; justify-content: center;
      font-size: 22px; flex-shrink: 0;
    }
    .app-icon.shift    { background: linear-gradient(135deg, #EFF6FF, #DBEAFE); }
    .app-icon.incident { background: linear-gradient(135deg, #F0FDF4, #CCFBF1); }
    .app-info { flex: 1; }
    .app-name { font-size: 15px; font-weight: 700; color: var(--text); margin-bottom: 3px; }
    .app-desc { font-size: 11px; color: var(--sub); line-height: 1.5; }
    .app-arr { font-size: 18px; color: #CBD5E1; transition: transform 0.18s; }
    .app-card:hover .app-arr { transform: translateX(2px); color: #94A3B8; }

    /* 設定ボタン */
    .settings-row {
      display: flex; align-items: center; justify-content: center;
      padding-top: 6px;
    }
    .settings-btn {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 10px 20px;
      background: transparent; border: 1.5px solid var(--border);
      border-radius: 100px; color: var(--sub);
      font-size: 13px; font-weight: 600; letter-spacing: 0.3px;
      cursor: pointer; transition: all 0.18s;
    }
    .settings-btn:hover {
      border-color: #CBD5E1;
      background: #F1F5F9; color: var(--text);
    }

    /* ══════════════════════════
       設定モーダル
    ══════════════════════════ */
    .modal-bg {
      position: fixed; inset: 0;
      background: rgba(15,23,42,0.45);
      backdrop-filter: blur(6px);
      display: flex; align-items: flex-end; justify-content: center;
      z-index: 200;
    }
    .modal-sheet {
      width: 100%; max-width: 480px;
      background: #fff;
      border-radius: 24px 24px 0 0;
      box-shadow: 0 -4px 32px rgba(0,0,0,0.1);
      max-height: 88vh; overflow-y: auto;
      padding-bottom: 48px;
    }
    .sheet-handle {
      width: 36px; height: 4px;
      background: var(--border); border-radius: 2px;
      margin: 12px auto 0;
    }
    .sheet-hdr {
      display: flex; align-items: center; justify-content: space-between;
      padding: 16px 22px 14px;
      border-bottom: 1px solid var(--border);
    }
    .sheet-hdr h2 { font-size: 16px; font-weight: 700; color: var(--text); }
    .sheet-close {
      background: #F1F5F9; border: none;
      color: var(--sub); font-size: 15px;
      width: 30px; height: 30px; border-radius: 50%;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
    }

    /* モーダル内パスワード */
    .modal-pwd { padding: 24px 22px; display: flex; flex-direction: column; gap: 10px; }
    .modal-pwd p { font-size: 13px; color: var(--sub); text-align: center; }

    /* 設定セクション */
    .sec { padding: 18px 22px; border-bottom: 1px solid var(--border); }
    .sec:last-child { border-bottom: none; }
    .sec-label {
      font-size: 10px; font-weight: 700; letter-spacing: 2px;
      color: var(--sub); text-transform: uppercase; margin-bottom: 4px;
    }
    .sec-note { font-size: 12px; color: #94A3B8; margin-bottom: 14px; line-height: 1.6; }

    /* スタッフ行 */
    .s-row {
      display: flex; align-items: center; gap: 12px;
      padding: 10px 0;
      border-bottom: 1px solid #F8FAFC;
    }
    .s-row:last-child { border-bottom: none; }
    .s-avatar {
      width: 34px; height: 34px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px; font-weight: 700; color: #fff; flex-shrink: 0;
    }
    .s-name { font-size: 14px; color: var(--text); flex: 1; font-weight: 500; }
    .s-self {
      font-size: 10px; color: var(--sub);
      background: var(--border); padding: 2px 7px; border-radius: 6px;
    }

    /* トグル */
    .tog { position: relative; display: inline-block; width: 42px; height: 24px; flex-shrink: 0; }
    .tog input { opacity: 0; width: 0; height: 0; }
    .tog-sl {
      position: absolute; inset: 0;
      background: var(--border); border-radius: 24px;
      cursor: pointer; transition: 0.22s;
    }
    .tog-sl::before {
      content: ''; position: absolute;
      width: 18px; height: 18px; border-radius: 50%;
      background: #fff; left: 3px; top: 3px;
      box-shadow: var(--shadow-sm); transition: 0.22s;
    }
    .tog input:checked + .tog-sl { background: var(--primary); }
    .tog input:checked + .tog-sl::before { transform: translateX(18px); }
    .tog input:disabled + .tog-sl { opacity: 0.4; cursor: not-allowed; }

    /* パスワード変更 */
    .pwd-fields { display: flex; flex-direction: column; gap: 8px; }
    .change-btn {
      width: 100%; padding: 13px;
      border-radius: 11px; border: 1.5px solid var(--border);
      background: #fff; color: var(--primary);
      font-size: 14px; font-weight: 700; cursor: pointer;
      transition: all 0.18s;
    }
    .change-btn:hover:not(:disabled) { background: #EFF6FF; border-color: var(--primary); }
    .change-btn:disabled { opacity: 0.45; cursor: not-allowed; }

    .msg-err { font-size: 12px; color: #EF4444; }
    .msg-ok  { font-size: 12px; color: #10B981; font-weight: 600; }
    .loading-msg { text-align: center; padding: 24px; color: var(--sub); font-size: 13px; }

    /* スタッフ管理 */
    .s-order-btns { display: flex; flex-direction: column; gap: 2px; }
    .s-order-btn {
      width: 24px; height: 20px;
      border: 1.5px solid var(--border); border-radius: 5px;
      background: #fff; color: var(--sub);
      font-size: 10px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.15s; padding: 0;
    }
    .s-order-btn:hover:not(:disabled) { border-color: var(--primary); color: var(--primary); background: #EFF6FF; }
    .s-order-btn:disabled { opacity: 0.2; cursor: not-allowed; }
    .s-actions { display: flex; gap: 6px; }
    .s-act-btn {
      padding: 5px 10px; border-radius: 8px;
      border: 1.5px solid var(--border); background: #fff;
      font-size: 12px; cursor: pointer; color: var(--sub);
      font-weight: 600; transition: all 0.15s;
    }
    .s-act-btn.edit:hover { border-color: var(--primary); color: var(--primary); background: #EFF6FF; }
    .s-act-btn.del:hover  { border-color: #EF4444; color: #EF4444; background: #FEF2F2; }
    .s-inactive { opacity: 0.5; }
    .s-badge {
      font-size: 10px; padding: 2px 7px; border-radius: 6px; font-weight: 600;
      background: #F1F5F9; color: #94A3B8;
    }
    .staff-form {
      background: #F8FAFC; border-radius: 14px;
      padding: 16px; margin-top: 12px;
      display: flex; flex-direction: column; gap: 12px;
      border: 1px solid var(--border);
    }
    .form-label { font-size: 12px; color: var(--sub); font-weight: 600; margin-bottom: 4px; display: block; }
    .color-grid { display: flex; gap: 8px; flex-wrap: wrap; }
    .color-swatch {
      width: 28px; height: 28px; border-radius: 50%;
      cursor: pointer; border: 3px solid transparent;
      transition: transform 0.15s, border-color 0.15s;
    }
    .color-swatch.selected { border-color: #0F172A; transform: scale(1.18); }
    .form-row { display: flex; gap: 8px; }
    .add-staff-btn {
      display: flex; align-items: center; justify-content: center; gap: 6px;
      width: 100%; padding: 11px; margin-top: 10px;
      border-radius: 11px; border: 1.5px dashed var(--border);
      background: transparent; color: var(--sub);
      font-size: 13px; font-weight: 600; cursor: pointer; transition: all 0.15s;
    }
    .add-staff-btn:hover { border-color: var(--primary); color: var(--primary); background: #EFF6FF; }
  </style>
</head>
<body>
<div id="app">

  <!-- ══ パスワード画面 ══ -->
  <div v-if="!appAuthenticated" class="pwd-screen">
    <div class="logo">
      <div class="logo-badge">
        <div class="logo-dot"></div>
        <span class="logo-label">Houmon Kango</span>
      </div>
      <div class="logo-title">訪問看護<br><em>ステーション</em></div>
    </div>
    <div class="card pwd-card">
      <span class="pwd-card-label">パスワード</span>
      <input
        type="password"
        v-model="appPwdInput"
        class="field"
        style="text-align:center; letter-spacing:3px"
        placeholder="パスワードを入力"
        @keyup.enter="checkAppPassword"
        autocomplete="current-password"
      />
      <p v-if="appPwdError" class="pwd-error">⚠ パスワードが違います</p>
      <div class="pwd-submit">
        <button class="btn-primary" @click="checkAppPassword">ログイン</button>
      </div>
    </div>
  </div>

  <!-- ══ アプリ一覧 ══ -->
  <div v-else>
    <div class="page-head">
      <div class="page-eyebrow">
        <div class="eyebrow-dot"></div>
        <span class="eyebrow-text">App Menu</span>
      </div>
      <div class="page-title">アプリを<br><em>選択</em>してください</div>
    </div>

    <div class="app-list">
      <a href="シフト管理/index.html" class="app-card shift">
        <div class="app-icon shift">📅</div>
        <div class="app-info">
          <div class="app-name">シフト管理</div>
          <div class="app-desc">週間スケジュール・スタッフ管理・利用者管理</div>
        </div>
        <span class="app-arr">›</span>
      </a>
      <a href="インシデント報告/incident.html" class="app-card incident">
        <div class="app-icon incident">📝</div>
        <div class="app-info">
          <div class="app-name">インシデント報告</div>
          <div class="app-desc">報告書の作成・一覧・月別分析</div>
        </div>
        <span class="app-arr">›</span>
      </a>
    </div>

    <div class="settings-row">
      <button class="settings-btn" @click="openSettings">⚙ 管理設定</button>
    </div>
  </div>

  <!-- ══ 設定モーダル ══ -->
  <div v-if="showModal" class="modal-bg" @click.self="closeModal">
    <div class="modal-sheet">
      <div class="sheet-handle"></div>
      <div class="sheet-hdr">
        <h2>⚙ 管理設定</h2>
        <button class="sheet-close" @click="closeModal">✕</button>
      </div>

      <!-- 管理パスワード未認証 -->
      <div v-if="!authenticated" class="modal-pwd">
        <p>管理設定のパスワードを入力してください</p>
        <input type="password" v-model="pwdInput" class="field" placeholder="管理パスワード"
          @keyup.enter="checkAdminPassword" autocomplete="current-password" />
        <p v-if="pwdError" class="msg-err">⚠ パスワードが違います</p>
        <button class="btn-primary" @click="checkAdminPassword">確認</button>
      </div>

      <!-- 認証済み -->
      <template v-else>
        <div v-if="loadingStaff" class="loading-msg">読み込み中...</div>
        <template v-else>

          <div class="sec">
            <div class="sec-label">🔑 編集権限の管理</div>
            <p class="sec-note">ONにしたスタッフは両アプリで編集・削除が可能になります</p>
            <div v-for="s in allStaff" :key="s.id" class="s-row">
              <div class="s-avatar" :style="{ background: s.color }">{{ s.name.charAt(0) }}</div>
              <span class="s-name">{{ s.name }}</span>
              <span v-if="s.id === currentAdminId" class="s-self">操作中</span>
              <label class="tog">
                <input type="checkbox" :checked="s.is_admin"
                  :disabled="s.id === currentAdminId" @change="toggleAdmin(s)" />
                <span class="tog-sl"></span>
              </label>
            </div>
            <p style="font-size:11px; color:#94A3B8; margin-top:10px">⚠ 操作中のアカウントは変更できません</p>
          </div>

          <!-- スタッフ管理 -->
          <div class="sec">
            <div class="sec-label">👥 スタッフ管理</div>
            <p class="sec-note">スタッフの追加・編集・削除ができます</p>
            <div v-for="(s, idx) in allStaff" :key="s.id" class="s-row" :class="{ 's-inactive': !s.active }">
              <div class="s-order-btns">
                <button class="s-order-btn" @click="moveStaff(idx, -1)" :disabled="idx === 0">▲</button>
                <button class="s-order-btn" @click="moveStaff(idx, 1)"  :disabled="idx === allStaff.length - 1">▼</button>
              </div>
              <div class="s-avatar" :style="{ background: s.color }">{{ s.name.charAt(0) }}</div>
              <span class="s-name">{{ s.name }}</span>
              <span v-if="!s.active" class="s-badge">非稼働</span>
              <div class="s-actions">
                <button class="s-act-btn edit" @click="openEditStaff(s)">編集</button>
                <button class="s-act-btn del"  @click="deleteStaff(s)">削除</button>
              </div>
            </div>
            <!-- 追加・編集フォーム -->
            <div v-if="staffForm.show" class="staff-form">
              <div>
                <span class="form-label">スタッフ名</span>
                <input class="field" v-model="staffForm.name" placeholder="例：山田" />
              </div>
              <div>
                <span class="form-label">カラー</span>
                <div class="color-grid">
                  <div v-for="c in colorOptions" :key="c"
                    class="color-swatch"
                    :class="{ selected: staffForm.color === c }"
                    :style="{ background: c }"
                    @click="staffForm.color = c">
                  </div>
                </div>
              </div>
              <div style="display:flex;align-items:center;gap:10px">
                <span class="form-label" style="margin:0">稼働中</span>
                <label class="tog">
                  <input type="checkbox" v-model="staffForm.active" />
                  <span class="tog-sl"></span>
                </label>
              </div>
              <div class="form-row">
                <button class="change-btn" style="flex:1" @click="staffForm.show=false">キャンセル</button>
                <button class="btn-primary" style="flex:2;padding:13px" @click="saveStaff" :disabled="staffForm.saving">
                  {{ staffForm.saving ? '保存中...' : (staffForm.isEdit ? '✓ 更新する' : '＋ 追加する') }}
                </button>
              </div>
            </div>
            <button v-if="!staffForm.show" class="add-staff-btn" @click="openAddStaff">
              ＋ スタッフを追加
            </button>
          </div>

          <div class="sec">
            <div class="sec-label">🔐 アプリパスワードの変更</div>
            <p class="sec-note">変更すると全スタッフが次回アクセス時に再入力が必要になります</p>
            <div class="pwd-fields">
              <input type="password" v-model="pwdChange.input"   class="field" placeholder="新しいパスワード" />
              <input type="password" v-model="pwdChange.confirm" class="field" placeholder="確認（もう一度入力）" />
              <p v-if="pwdChange.error"   class="msg-err">{{ pwdChange.error }}</p>
              <p v-if="pwdChange.success" class="msg-ok">✅ パスワードを変更しました</p>
              <button class="change-btn" @click="savePassword" :disabled="pwdChange.saving">
                {{ pwdChange.saving ? '保存中...' : '🔒 パスワードを変更する' }}
              </button>
            </div>
          </div>

        </template>
      </template>
    </div>
  </div>

</div>
<script>
const { createClient } = supabase;
const db = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
const { createApp } = Vue;

createApp({
  data() {
    return {
      appPassword: '', adminPassword: '',
      appAuthenticated: false, appPwdInput: '', appPwdError: false,
      showModal: false, authenticated: false, pwdInput: '', pwdError: false,
      loadingStaff: false, allStaff: [], currentAdminId: null,
      pwdChange: { input: '', confirm: '', saving: false, error: '', success: false },
      staffForm: { show: false, isEdit: false, staffId: null, name: '', color: '#1E88E5', active: true, saving: false },
      colorOptions: ['#E53935','#8E24AA','#1E88E5','#00897B','#43A047','#F4511E','#FB8C00','#D81B60','#6D4C41','#546E7A'],
    };
  },
  async mounted() {
    const [{ data: a }, { data: b }] = await Promise.all([
      db.from('settings').select('value').eq('key', 'app_password').single(),
      db.from('settings').select('value').eq('key', 'admin_password').single(),
    ]);
    this.appPassword = a?.value || ''; this.adminPassword = b?.value || '';
    if (localStorage.getItem('app_auth') === this.appPassword) this.appAuthenticated = true;
    if (localStorage.getItem('admin_auth') === this.adminPassword) {
      this.authenticated = true;
      try { this.currentAdminId = JSON.parse(localStorage.getItem('incident_staff'))?.id || null; } catch {}
    }
  },
  methods: {
    checkAppPassword() {
      if (!this.appPwdInput) return;
      if (this.appPwdInput === this.appPassword) {
        localStorage.setItem('app_auth', this.appPassword);
        this.appAuthenticated = true; this.appPwdError = false; this.appPwdInput = '';
      } else { this.appPwdError = true; this.appPwdInput = ''; }
    },
    async openSettings() {
      this.showModal = true;
      if (this.authenticated) await this.loadStaff();
    },
    closeModal() { this.showModal = false; this.pwdInput = ''; this.pwdError = false; },
    async checkAdminPassword() {
      if (!this.pwdInput) return;
      if (this.pwdInput === this.adminPassword) {
        localStorage.setItem('admin_auth', this.adminPassword);
        this.authenticated = true; this.pwdError = false; this.pwdInput = '';
        try { this.currentAdminId = JSON.parse(localStorage.getItem('incident_staff'))?.id || null; } catch {}
        await this.loadStaff();
      } else { this.pwdError = true; this.pwdInput = ''; }
    },
    async loadStaff() {
      this.loadingStaff = true;
      const { data } = await db.from('staff').select('*').order('sort_order', { ascending: true, nullsFirst: false });
      this.allStaff = data || []; this.loadingStaff = false;
    },
    openAddStaff() {
      this.staffForm = {
        show: true, isEdit: false, staffId: null, saving: false,
        name: '', color: this.colorOptions[this.allStaff.length % this.colorOptions.length], active: true,
      };
    },
    openEditStaff(s) {
      this.staffForm = { show: true, isEdit: true, staffId: s.id, name: s.name, color: s.color, active: s.active, saving: false };
    },
    async saveStaff() {
      if (!this.staffForm.name.trim()) { alert('スタッフ名を入力してください'); return; }
      this.staffForm.saving = true;
      const payload = { name: this.staffForm.name.trim(), color: this.staffForm.color, active: this.staffForm.active };
      try {
        if (this.staffForm.isEdit) {
          const { error } = await db.from('staff').update(payload).eq('id', this.staffForm.staffId);
          if (error) throw error;
          const idx = this.allStaff.findIndex(s => s.id === this.staffForm.staffId);
          if (idx !== -1) Object.assign(this.allStaff[idx], payload);
        } else {
          const maxOrder = this.allStaff.reduce((m, s) => Math.max(m, s.sort_order || 0), 0);
          const { data, error } = await db.from('staff').insert({ ...payload, is_admin: false, sort_order: maxOrder + 1 }).select().single();
          if (error) throw error;
          this.allStaff.push(data);
        }
        this.staffForm.show = false;
      } catch(e) { alert('保存エラー: ' + e.message); }
      finally { this.staffForm.saving = false; }
    },
    async moveStaff(idx, dir) {
      const targetIdx = idx + dir;
      if (targetIdx < 0 || targetIdx >= this.allStaff.length) return;
      const a = this.allStaff[idx];
      const b = this.allStaff[targetIdx];
      const [r1, r2] = await Promise.all([
        db.from('staff').update({ sort_order: b.sort_order }).eq('id', a.id),
        db.from('staff').update({ sort_order: a.sort_order }).eq('id', b.id),
      ]);
      if (r1.error || r2.error) { alert('更新エラー'); return; }
      const tmpOrder = a.sort_order;
      a.sort_order = b.sort_order;
      b.sort_order = tmpOrder;
      this.allStaff.splice(idx, 1);
      this.allStaff.splice(targetIdx, 0, a);
    },
    async deleteStaff(s) {
      if (!confirm(`「${s.name}」を削除しますか？\n関連するシフト・訪問データも削除されます。`)) return;
      const { error } = await db.from('staff').delete().eq('id', s.id);
      if (error) { alert('削除エラー: ' + error.message); return; }
      this.allStaff = this.allStaff.filter(st => st.id !== s.id);
    },
    async toggleAdmin(staff) {
      const newVal = !staff.is_admin;
      if (!confirm(`「${staff.name}」に編集権限を${newVal ? '付与' : '削除'}しますか？`)) { await this.loadStaff(); return; }
      const { error } = await db.from('staff').update({ is_admin: newVal }).eq('id', staff.id);
      if (error) alert('更新エラー: ' + error.message);
      else staff.is_admin = newVal;
    },
    async savePassword() {
      this.pwdChange.error = '';
      if (!this.pwdChange.input) { this.pwdChange.error = 'パスワードを入力してください'; return; }
      if (this.pwdChange.input !== this.pwdChange.confirm) { this.pwdChange.error = 'パスワードが一致しません'; return; }
      this.pwdChange.saving = true;
      try {
        const { error } = await db.from('settings').update({ value: this.pwdChange.input }).eq('key', 'app_password');
        if (error) throw error;
        this.appPassword = this.pwdChange.input;
        localStorage.setItem('app_auth', this.appPassword);
        this.pwdChange.input = ''; this.pwdChange.confirm = '';
        this.pwdChange.success = true;
        setTimeout(() => { this.pwdChange.success = false; }, 3000);
      } catch(e) { this.pwdChange.error = '保存エラー: ' + e.message; }
      finally { this.pwdChange.saving = false; }
    },
  },
}).mount('#app');
</script>
</body>
</html>
