<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>訪問看護ステーション</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/vue@3/dist/vue.global.prod.js"></script>
  <script src="config.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Sans', 'Yu Gothic UI', sans-serif;
      background: #070B18;
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      padding: 32px 20px;
      overflow-x: hidden;
    }

    /* ── 背景グロー ── */
    body::before, body::after {
      content: '';
      position: fixed;
      border-radius: 50%;
      pointer-events: none;
    }
    body::before {
      width: 600px; height: 600px;
      background: radial-gradient(circle, rgba(30,136,229,0.12) 0%, transparent 65%);
      top: -150px; right: -150px;
    }
    body::after {
      width: 500px; height: 500px;
      background: radial-gradient(circle, rgba(0,137,123,0.10) 0%, transparent 65%);
      bottom: -150px; left: -150px;
    }

    #app { width: 100%; max-width: 400px; position: relative; z-index: 1; }

    /* ══════════════════════════
       パスワード画面
    ══════════════════════════ */
    .pwd-screen { text-align: center; }

    .brand { margin-bottom: 48px; }
    .brand-line {
      display: flex; align-items: center; justify-content: center;
      gap: 10px; margin-bottom: 10px;
    }
    .brand-accent {
      width: 28px; height: 2px;
      background: linear-gradient(90deg, transparent, #1E88E5);
    }
    .brand-accent.right {
      background: linear-gradient(90deg, #00897B, transparent);
    }
    .brand-name {
      font-size: 13px; font-weight: 700;
      letter-spacing: 3px;
      background: linear-gradient(135deg, #64B5F6, #80CBC4);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      text-transform: uppercase;
    }
    .brand-title {
      font-size: 26px; font-weight: 700;
      color: #fff; letter-spacing: 0.5px;
      line-height: 1.3;
    }

    .pwd-label {
      font-size: 12px; color: rgba(255,255,255,0.35);
      letter-spacing: 2px; text-transform: uppercase;
      margin-bottom: 20px; display: block;
    }
    .pwd-input-wrap { position: relative; margin-bottom: 10px; }
    .pwd-input {
      width: 100%; padding: 15px 18px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 14px;
      color: #fff; font-size: 16px; outline: none;
      text-align: center; letter-spacing: 3px;
      transition: border-color 0.2s, background 0.2s;
    }
    .pwd-input::placeholder { color: rgba(255,255,255,0.2); letter-spacing: 1px; font-size: 13px; }
    .pwd-input:focus {
      border-color: rgba(30,136,229,0.5);
      background: rgba(255,255,255,0.07);
    }
    .pwd-error {
      font-size: 12px; color: #EF5350;
      text-align: center; margin-bottom: 12px;
      letter-spacing: 0.5px;
    }
    .pwd-btn {
      width: 100%; padding: 15px;
      border-radius: 14px; border: none;
      background: linear-gradient(135deg, #1565C0 0%, #00897B 100%);
      color: #fff; font-size: 15px; font-weight: 700;
      letter-spacing: 1px; cursor: pointer;
      position: relative; overflow: hidden;
      transition: opacity 0.2s, transform 0.15s;
    }
    .pwd-btn::after {
      content: '';
      position: absolute; inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.1), transparent);
    }
    .pwd-btn:active { opacity: 0.85; transform: scale(0.99); }

    /* ══════════════════════════
       アプリ一覧
    ══════════════════════════ */
    .page-header { margin-bottom: 32px; }
    .page-eyebrow {
      display: flex; align-items: center; gap: 8px;
      margin-bottom: 8px;
    }
    .eyebrow-dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: linear-gradient(135deg, #1E88E5, #00897B);
    }
    .eyebrow-text {
      font-size: 11px; font-weight: 700; letter-spacing: 3px;
      color: rgba(255,255,255,0.35); text-transform: uppercase;
    }
    .page-title {
      font-size: 28px; font-weight: 700;
      color: #fff; letter-spacing: 0.3px; line-height: 1.2;
    }
    .page-title span {
      background: linear-gradient(135deg, #42A5F5, #26C6DA);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }

    /* アプリカード */
    .app-list { display: flex; flex-direction: column; gap: 12px; margin-bottom: 16px; }

    .app-card {
      display: flex; align-items: center; gap: 16px;
      padding: 18px 20px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 18px; text-decoration: none;
      position: relative; overflow: hidden;
      transition: all 0.2s;
    }
    .app-card::before {
      content: '';
      position: absolute; top: 0; left: 0;
      width: 3px; height: 100%;
      border-radius: 18px 0 0 18px;
      transition: opacity 0.2s;
    }
    .app-card.shift::before  { background: linear-gradient(180deg, #1E88E5, #42A5F5); }
    .app-card.incident::before { background: linear-gradient(180deg, #00897B, #26C6DA); }
    .app-card:hover {
      background: rgba(255,255,255,0.07);
      border-color: rgba(255,255,255,0.14);
      transform: translateX(4px);
    }

    .app-icon-wrap {
      width: 48px; height: 48px; border-radius: 14px;
      display: flex; align-items: center; justify-content: center;
      font-size: 22px; flex-shrink: 0;
    }
    .app-icon-wrap.shift    { background: rgba(30,136,229,0.15); }
    .app-icon-wrap.incident { background: rgba(0,137,123,0.15); }

    .app-text { flex: 1; }
    .app-name {
      font-size: 15px; font-weight: 700;
      color: #fff; margin-bottom: 3px; letter-spacing: 0.2px;
    }
    .app-desc {
      font-size: 11px; color: rgba(255,255,255,0.35);
      line-height: 1.5; letter-spacing: 0.3px;
    }
    .app-arrow {
      font-size: 16px; color: rgba(255,255,255,0.2);
      transition: transform 0.2s, color 0.2s;
    }
    .app-card:hover .app-arrow { transform: translateX(2px); color: rgba(255,255,255,0.4); }

    /* 区切り線 */
    .divider {
      display: flex; align-items: center; gap: 12px;
      margin: 16px 0;
    }
    .divider-line { flex: 1; height: 1px; background: rgba(255,255,255,0.06); }
    .divider-text { font-size: 10px; color: rgba(255,255,255,0.2); letter-spacing: 2px; }

    /* 設定ボタン */
    .settings-btn {
      display: flex; align-items: center; justify-content: center; gap: 8px;
      width: 100%; padding: 13px;
      background: transparent;
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 14px;
      color: rgba(255,255,255,0.3); font-size: 13px;
      letter-spacing: 0.5px; cursor: pointer;
      transition: all 0.2s;
    }
    .settings-btn:hover {
      background: rgba(255,255,255,0.04);
      border-color: rgba(255,255,255,0.12);
      color: rgba(255,255,255,0.55);
    }

    /* ══════════════════════════
       設定モーダル
    ══════════════════════════ */
    .modal-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.8);
      backdrop-filter: blur(8px);
      display: flex; align-items: flex-end; justify-content: center;
      z-index: 100;
    }
    .modal-sheet {
      width: 100%; max-width: 480px;
      background: #0F1627;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 24px 24px 0 0;
      max-height: 88vh; overflow-y: auto;
      padding-bottom: 48px;
    }
    .modal-handle {
      width: 36px; height: 4px;
      background: rgba(255,255,255,0.12);
      border-radius: 2px; margin: 14px auto 0;
    }
    .modal-hdr {
      display: flex; align-items: center; justify-content: space-between;
      padding: 16px 22px 14px;
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }
    .modal-hdr h2 {
      color: #fff; font-size: 16px; font-weight: 700; letter-spacing: 0.3px;
    }
    .modal-close {
      background: rgba(255,255,255,0.07); border: none;
      color: rgba(255,255,255,0.5); font-size: 16px;
      width: 30px; height: 30px; border-radius: 50%;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
    }

    /* モーダル内パスワード */
    .modal-pwd { padding: 28px 22px; display: flex; flex-direction: column; gap: 10px; }
    .modal-pwd p { font-size: 13px; color: rgba(255,255,255,0.4); text-align: center; margin-bottom: 6px; }

    /* 設定セクション */
    .setting-section { padding: 18px 22px; border-bottom: 1px solid rgba(255,255,255,0.05); }
    .setting-section:last-child { border-bottom: none; }
    .section-label {
      font-size: 10px; font-weight: 700; letter-spacing: 2.5px;
      color: rgba(255,255,255,0.3); text-transform: uppercase;
      margin-bottom: 14px;
    }
    .section-note { font-size: 11px; color: rgba(255,255,255,0.3); margin-bottom: 14px; line-height: 1.6; }

    /* スタッフ行 */
    .staff-row {
      display: flex; align-items: center; gap: 12px;
      padding: 9px 0;
      border-bottom: 1px solid rgba(255,255,255,0.04);
    }
    .staff-row:last-child { border-bottom: none; }
    .staff-avatar {
      width: 34px; height: 34px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px; font-weight: 700; color: #fff; flex-shrink: 0;
    }
    .staff-name { color: rgba(255,255,255,0.85); font-size: 14px; flex: 1; }
    .self-badge {
      font-size: 10px; color: rgba(255,255,255,0.3);
      background: rgba(255,255,255,0.07);
      padding: 2px 7px; border-radius: 6px; letter-spacing: 0.5px;
    }

    /* トグル */
    .toggle { position: relative; display: inline-block; width: 42px; height: 23px; flex-shrink: 0; }
    .toggle input { opacity: 0; width: 0; height: 0; }
    .toggle-slider {
      position: absolute; inset: 0;
      background: rgba(255,255,255,0.1); border-radius: 23px;
      cursor: pointer; transition: 0.25s;
    }
    .toggle-slider::before {
      content: ''; position: absolute;
      width: 17px; height: 17px; border-radius: 50%;
      background: #fff; left: 3px; top: 3px; transition: 0.25s;
    }
    .toggle input:checked + .toggle-slider { background: #1976D2; }
    .toggle input:checked + .toggle-slider::before { transform: translateX(19px); }
    .toggle input:disabled + .toggle-slider { opacity: 0.35; cursor: not-allowed; }

    /* パスワード変更フォーム */
    .pwd-fields { display: flex; flex-direction: column; gap: 8px; }
    .field-input {
      width: 100%; padding: 12px 14px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.09);
      border-radius: 11px; color: #fff; font-size: 14px; outline: none;
      transition: border-color 0.2s;
    }
    .field-input::placeholder { color: rgba(255,255,255,0.25); }
    .field-input:focus { border-color: rgba(30,136,229,0.45); }
    .change-btn {
      width: 100%; padding: 12px;
      border-radius: 11px; border: none;
      background: rgba(25,118,210,0.2);
      border: 1px solid rgba(25,118,210,0.35);
      color: #90CAF9; font-size: 14px; font-weight: 700;
      letter-spacing: 0.3px; cursor: pointer; transition: all 0.2s;
    }
    .change-btn:hover:not(:disabled) { background: rgba(25,118,210,0.3); }
    .change-btn:disabled { opacity: 0.45; cursor: not-allowed; }

    .msg-err { font-size: 12px; color: #EF5350; }
    .msg-ok  { font-size: 12px; color: #66BB6A; }
    .loading-msg { text-align: center; padding: 24px; color: rgba(255,255,255,0.3); font-size: 13px; }
  </style>
</head>
<body>
<div id="app">

  <!-- ══ パスワード画面 ══ -->
  <div v-if="!appAuthenticated" class="pwd-screen">
    <div class="brand">
      <div class="brand-line">
        <div class="brand-accent"></div>
        <span class="brand-name">Houmon Kango</span>
        <div class="brand-accent right"></div>
      </div>
      <div class="brand-title">訪問看護<br>ステーション</div>
    </div>
    <span class="pwd-label">Password</span>
    <div class="pwd-input-wrap">
      <input
        type="password"
        v-model="appPwdInput"
        class="pwd-input"
        placeholder="パスワードを入力"
        @keyup.enter="checkAppPassword"
        autocomplete="current-password"
      />
    </div>
    <p v-if="appPwdError" class="pwd-error">パスワードが違います</p>
    <button class="pwd-btn" @click="checkAppPassword">ログイン</button>
  </div>

  <!-- ══ アプリ一覧 ══ -->
  <div v-else>
    <div class="page-header">
      <div class="page-eyebrow">
        <div class="eyebrow-dot"></div>
        <span class="eyebrow-text">Houmon Kango Station</span>
      </div>
      <div class="page-title">アプリを<br><span>選択</span>してください</div>
    </div>

    <div class="app-list">
      <a href="シフト管理/index.html" class="app-card shift">
        <div class="app-icon-wrap shift">📅</div>
        <div class="app-text">
          <div class="app-name">シフト管理</div>
          <div class="app-desc">週間スケジュール・スタッフ管理・利用者管理</div>
        </div>
        <span class="app-arrow">›</span>
      </a>
      <a href="インシデント報告/incident.html" class="app-card incident">
        <div class="app-icon-wrap incident">📝</div>
        <div class="app-text">
          <div class="app-name">インシデント報告</div>
          <div class="app-desc">報告書の作成・一覧・月別分析</div>
        </div>
        <span class="app-arrow">›</span>
      </a>
    </div>

    <div class="divider">
      <div class="divider-line"></div>
      <span class="divider-text">管理</span>
      <div class="divider-line"></div>
    </div>

    <button class="settings-btn" @click="openSettings">⚙️&nbsp;&nbsp;管理設定</button>
  </div>

  <!-- ══ 設定モーダル ══ -->
  <div v-if="showModal" class="modal-overlay" @click.self="closeModal">
    <div class="modal-sheet">
      <div class="modal-handle"></div>
      <div class="modal-hdr">
        <h2>管理設定</h2>
        <button class="modal-close" @click="closeModal">✕</button>
      </div>

      <!-- 管理パスワード未認証 -->
      <div v-if="!authenticated" class="modal-pwd">
        <p>管理設定のパスワードを入力してください</p>
        <input
          type="password"
          v-model="pwdInput"
          class="field-input"
          placeholder="管理パスワード"
          @keyup.enter="checkAdminPassword"
          autocomplete="current-password"
        />
        <p v-if="pwdError" class="msg-err">パスワードが違います</p>
        <button class="pwd-btn" @click="checkAdminPassword">確認</button>
      </div>

      <!-- 認証済み -->
      <template v-else>
        <div v-if="loadingStaff" class="loading-msg">読み込み中...</div>
        <template v-else>

          <!-- 編集権限 -->
          <div class="setting-section">
            <div class="section-label">🔑 編集権限の管理</div>
            <p class="section-note">ONにしたスタッフは両アプリで編集・削除が可能になります</p>
            <div v-for="s in allStaff" :key="s.id" class="staff-row">
              <div class="staff-avatar" :style="{ background: s.color }">{{ s.name.charAt(0) }}</div>
              <span class="staff-name">{{ s.name }}</span>
              <span v-if="s.id === currentAdminId" class="self-badge">操作中</span>
              <label class="toggle">
                <input
                  type="checkbox"
                  :checked="s.is_admin"
                  :disabled="s.id === currentAdminId"
                  @change="toggleAdmin(s)"
                />
                <span class="toggle-slider"></span>
              </label>
            </div>
            <p style="font-size:11px; color:rgba(255,255,255,0.25); margin-top:12px">⚠️ 操作中のアカウントは変更できません</p>
          </div>

          <!-- パスワード変更 -->
          <div class="setting-section">
            <div class="section-label">🔐 アプリパスワードの変更</div>
            <p class="section-note">変更すると全スタッフが次回アクセス時に再入力が必要になります</p>
            <div class="pwd-fields">
              <input type="password" v-model="pwdChange.input"   class="field-input" placeholder="新しいパスワード" />
              <input type="password" v-model="pwdChange.confirm" class="field-input" placeholder="確認（もう一度入力）" />
              <p v-if="pwdChange.error"   class="msg-err">{{ pwdChange.error }}</p>
              <p v-if="pwdChange.success" class="msg-ok">✅ パスワードを変更しました</p>
              <button class="change-btn" @click="savePassword" :disabled="pwdChange.saving">
                {{ pwdChange.saving ? '保存中...' : '🔒 パスワードを変更する' }}
              </button>
            </div>
          </div>

        </template>
      </template>
    </div>
  </div>

</div>
<script>
const { createClient } = supabase;
const db = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
const { createApp } = Vue;

createApp({
  data() {
    return {
      appPassword: '', adminPassword: '',
      appAuthenticated: false,
      appPwdInput: '', appPwdError: false,
      showModal: false,
      authenticated: false,
      pwdInput: '', pwdError: false,
      loadingStaff: false,
      allStaff: [], currentAdminId: null,
      pwdChange: { input: '', confirm: '', saving: false, error: '', success: false },
    };
  },

  async mounted() {
    const [{ data: appPwd }, { data: adminPwd }] = await Promise.all([
      db.from('settings').select('value').eq('key', 'app_password').single(),
      db.from('settings').select('value').eq('key', 'admin_password').single(),
    ]);
    this.appPassword   = appPwd?.value   || '';
    this.adminPassword = adminPwd?.value || '';

    if (localStorage.getItem('app_auth') === this.appPassword) this.appAuthenticated = true;
    if (localStorage.getItem('admin_auth') === this.adminPassword) {
      this.authenticated = true;
      try { this.currentAdminId = JSON.parse(localStorage.getItem('incident_staff'))?.id || null; } catch {}
    }
  },

  methods: {
    checkAppPassword() {
      if (!this.appPwdInput) return;
      if (this.appPwdInput === this.appPassword) {
        localStorage.setItem('app_auth', this.appPassword);
        this.appAuthenticated = true; this.appPwdError = false; this.appPwdInput = '';
      } else { this.appPwdError = true; this.appPwdInput = ''; }
    },

    async openSettings() {
      this.showModal = true;
      if (this.authenticated) await this.loadStaff();
    },

    closeModal() { this.showModal = false; this.pwdInput = ''; this.pwdError = false; },

    async checkAdminPassword() {
      if (!this.pwdInput) return;
      if (this.pwdInput === this.adminPassword) {
        localStorage.setItem('admin_auth', this.adminPassword);
        this.authenticated = true; this.pwdError = false; this.pwdInput = '';
        try { this.currentAdminId = JSON.parse(localStorage.getItem('incident_staff'))?.id || null; } catch {}
        await this.loadStaff();
      } else { this.pwdError = true; this.pwdInput = ''; }
    },

    async loadStaff() {
      this.loadingStaff = true;
      const { data } = await db.from('staff').select('*').eq('active', true).order('name');
      this.allStaff = data || [];
      this.loadingStaff = false;
    },

    async toggleAdmin(staff) {
      const newVal = !staff.is_admin;
      const action = newVal ? '編集権限を付与' : '編集権限を削除';
      if (!confirm(`「${staff.name}」に${action}しますか？`)) { await this.loadStaff(); return; }
      const { error } = await db.from('staff').update({ is_admin: newVal }).eq('id', staff.id);
      if (error) alert('更新エラー: ' + error.message);
      else staff.is_admin = newVal;
    },

    async savePassword() {
      this.pwdChange.error = '';
      if (!this.pwdChange.input) { this.pwdChange.error = 'パスワードを入力してください'; return; }
      if (this.pwdChange.input !== this.pwdChange.confirm) { this.pwdChange.error = 'パスワードが一致しません'; return; }
      this.pwdChange.saving = true;
      try {
        const { error } = await db.from('settings').update({ value: this.pwdChange.input }).eq('key', 'app_password');
        if (error) throw error;
        this.appPassword = this.pwdChange.input;
        localStorage.setItem('app_auth', this.appPassword);
        this.pwdChange.input = ''; this.pwdChange.confirm = '';
        this.pwdChange.success = true;
        setTimeout(() => { this.pwdChange.success = false; }, 3000);
      } catch(e) { this.pwdChange.error = '保存エラー: ' + e.message; }
      finally { this.pwdChange.saving = false; }
    },
  },
}).mount('#app');
</script>
</body>
</html>
