<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>訪問看護ステーション アプリ一覧</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/vue@3/dist/vue.global.prod.js"></script>
  <script src="config.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Sans', 'Yu Gothic UI', sans-serif;
      background: #0A0F1E; min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      padding: 24px 16px;
    }

    /* ===== Landing Page ===== */
    .container { width: 100%; max-width: 400px; }
    .header { text-align: center; margin-bottom: 40px; }
    .header-icon { font-size: 52px; margin-bottom: 14px; display: block;
      filter: drop-shadow(0 0 16px rgba(30,136,229,0.6)); }
    .header h1 { font-size: 22px; font-weight: 700; color: #fff; margin-bottom: 6px; }
    .header p { font-size: 12px; color: rgba(255,255,255,0.4); letter-spacing: 1px; text-transform: uppercase; }
    .app-list { display: flex; flex-direction: column; gap: 14px; }
    .app-card {
      display: flex; align-items: center; gap: 18px;
      padding: 20px 22px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 16px; text-decoration: none;
      transition: all 0.18s;
    }
    .app-card:hover {
      background: rgba(255,255,255,0.1);
      border-color: rgba(255,255,255,0.25);
      transform: translateY(-2px);
    }
    .app-icon {
      width: 52px; height: 52px; border-radius: 14px;
      display: flex; align-items: center; justify-content: center;
      font-size: 26px; flex-shrink: 0;
    }
    .icon-shift    { background: linear-gradient(135deg, #1565C0, #1E88E5); }
    .icon-incident { background: linear-gradient(135deg, #00695C, #00897B); }
    .app-info { flex: 1; }
    .app-name { font-size: 16px; font-weight: 700; color: #fff; margin-bottom: 4px; }
    .app-desc { font-size: 12px; color: rgba(255,255,255,0.45); line-height: 1.5; }
    .app-arrow { font-size: 18px; color: rgba(255,255,255,0.3); }

    /* Settings Button */
    .settings-btn {
      display: flex; align-items: center; justify-content: center; gap: 8px;
      width: 100%; margin-top: 20px; padding: 14px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 14px; color: rgba(255,255,255,0.45);
      font-size: 14px; cursor: pointer; transition: all 0.18s;
    }
    .settings-btn:hover {
      background: rgba(255,255,255,0.08);
      border-color: rgba(255,255,255,0.18);
      color: rgba(255,255,255,0.7);
    }

    /* ===== Modal Overlay ===== */
    .modal-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.75);
      backdrop-filter: blur(6px);
      display: flex; align-items: flex-end; justify-content: center;
      z-index: 100;
      padding: 0;
    }
    .modal-sheet {
      width: 100%; max-width: 480px;
      background: #141929;
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 24px 24px 0 0;
      max-height: 90vh; overflow-y: auto;
      padding: 0 0 40px 0;
    }
    .modal-drag {
      width: 40px; height: 4px;
      background: rgba(255,255,255,0.15);
      border-radius: 2px; margin: 14px auto 0;
    }
    .modal-hdr {
      display: flex; align-items: center; justify-content: space-between;
      padding: 16px 20px 12px;
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }
    .modal-hdr h2 { color: #fff; font-size: 17px; font-weight: 700; }
    .modal-close-btn {
      background: rgba(255,255,255,0.08); border: none;
      color: rgba(255,255,255,0.6); font-size: 18px;
      width: 32px; height: 32px; border-radius: 50%;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
    }

    /* ===== Password Form (in modal) ===== */
    .pwd-section {
      padding: 28px 20px;
      display: flex; flex-direction: column; gap: 12px;
    }
    .pwd-section p { color: rgba(255,255,255,0.5); font-size: 13px; text-align: center; margin-bottom: 4px; }
    .pwd-input {
      width: 100%; padding: 14px 16px;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.15);
      background: rgba(255,255,255,0.08);
      color: #fff; font-size: 16px; outline: none;
      text-align: center; letter-spacing: 2px;
    }
    .pwd-input::placeholder { color: rgba(255,255,255,0.35); letter-spacing: 0; }
    .pwd-input:focus { border-color: rgba(255,255,255,0.35); background: rgba(255,255,255,0.12); }
    .pwd-error { color: #FF5252; font-size: 13px; text-align: center; }
    .pwd-submit-btn {
      width: 100%; padding: 14px;
      border-radius: 12px; border: none;
      background: linear-gradient(135deg, #1E88E5, #00897B);
      color: #fff; font-size: 16px; font-weight: 600;
      cursor: pointer; transition: opacity 0.2s;
    }
    .pwd-submit-btn:active { opacity: 0.8; }

    /* ===== Settings Content ===== */
    .settings-section {
      padding: 16px 20px;
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }
    .settings-section:last-child { border-bottom: none; }
    .settings-section-title {
      font-size: 13px; font-weight: 700;
      color: rgba(255,255,255,0.5);
      letter-spacing: 0.5px; text-transform: uppercase;
      margin-bottom: 12px;
    }

    /* Staff admin list */
    .staff-row {
      display: flex; align-items: center; gap: 12px;
      padding: 10px 0;
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }
    .staff-row:last-child { border-bottom: none; }
    .staff-avatar {
      width: 36px; height: 36px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 15px; font-weight: 700; color: #fff; flex-shrink: 0;
    }
    .staff-name { color: #fff; font-size: 15px; flex: 1; }
    .self-tag {
      font-size: 11px; color: rgba(255,255,255,0.4);
      background: rgba(255,255,255,0.08);
      padding: 2px 7px; border-radius: 8px;
    }
    /* Toggle Switch */
    .toggle { position: relative; display: inline-block; width: 44px; height: 24px; flex-shrink: 0; }
    .toggle input { opacity: 0; width: 0; height: 0; }
    .toggle-slider {
      position: absolute; inset: 0;
      background: rgba(255,255,255,0.15); border-radius: 24px;
      cursor: pointer; transition: 0.25s;
    }
    .toggle-slider::before {
      content: ''; position: absolute;
      width: 18px; height: 18px; border-radius: 50%;
      background: #fff; left: 3px; top: 3px;
      transition: 0.25s;
    }
    .toggle input:checked + .toggle-slider { background: #1E88E5; }
    .toggle input:checked + .toggle-slider::before { transform: translateX(20px); }
    .toggle input:disabled + .toggle-slider { opacity: 0.4; cursor: not-allowed; }

    /* Password change form */
    .pwd-change-group { display: flex; flex-direction: column; gap: 8px; margin-top: 4px; }
    .pwd-change-input {
      width: 100%; padding: 11px 14px;
      border-radius: 10px;
      border: 1px solid rgba(255,255,255,0.15);
      background: rgba(255,255,255,0.07);
      color: #fff; font-size: 14px; outline: none;
    }
    .pwd-change-input::placeholder { color: rgba(255,255,255,0.3); }
    .pwd-change-input:focus { border-color: rgba(255,255,255,0.3); background: rgba(255,255,255,0.1); }
    .pwd-change-btn {
      width: 100%; padding: 12px;
      border-radius: 10px; border: none;
      background: rgba(30,136,229,0.25);
      border: 1px solid rgba(30,136,229,0.4);
      color: #90CAF9; font-size: 14px; font-weight: 600;
      cursor: pointer; transition: all 0.2s;
    }
    .pwd-change-btn:hover { background: rgba(30,136,229,0.35); }
    .pwd-change-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .msg-error { color: #FF5252; font-size: 13px; }
    .msg-success { color: #81C784; font-size: 13px; }

    /* Loading indicator */
    .loading-dots { text-align: center; padding: 20px; color: rgba(255,255,255,0.4); font-size: 14px; }
  </style>
</head>
<body>
<div id="app">

  <!-- ===== ランディングページ ===== -->
  <div class="container">
    <div class="header">
      <span class="header-icon">🏥</span>
      <h1>訪問看護ステーション</h1>
      <p>アプリを選択してください</p>
    </div>
    <div class="app-list">
      <a href="シフト管理/index.html" class="app-card">
        <div class="app-icon icon-shift">📅</div>
        <div class="app-info">
          <div class="app-name">シフト管理</div>
          <div class="app-desc">週間スケジュール・スタッフ管理・利用者管理</div>
        </div>
        <span class="app-arrow">›</span>
      </a>
      <a href="インシデント報告/incident.html" class="app-card">
        <div class="app-icon icon-incident">📝</div>
        <div class="app-info">
          <div class="app-name">インシデント報告</div>
          <div class="app-desc">報告書の作成・一覧・月別分析</div>
        </div>
        <span class="app-arrow">›</span>
      </a>
    </div>

    <!-- 管理設定ボタン -->
    <button class="settings-btn" @click="openSettings">⚙️ 管理設定</button>
  </div>

  <!-- ===== 設定モーダル ===== -->
  <div v-if="showModal" class="modal-overlay" @click.self="closeModal">
    <div class="modal-sheet">
      <div class="modal-drag"></div>
      <div class="modal-hdr">
        <h2>⚙️ 管理設定</h2>
        <button class="modal-close-btn" @click="closeModal">✕</button>
      </div>

      <!-- パスワード未認証 -->
      <div v-if="!authenticated" class="pwd-section">
        <p>管理設定を開くにはパスワードを入力してください</p>
        <input
          type="password"
          v-model="pwdInput"
          class="pwd-input"
          placeholder="パスワードを入力"
          @keyup.enter="checkPassword"
          autocomplete="current-password"
        />
        <div v-if="pwdError" class="pwd-error">パスワードが違います</div>
        <button class="pwd-submit-btn" @click="checkPassword">確認</button>
      </div>

      <!-- 認証済み：設定内容 -->
      <template v-else>

        <!-- 読み込み中 -->
        <div v-if="loadingStaff" class="loading-dots">読み込み中...</div>

        <template v-else>
          <!-- 管理者権限の管理 -->
          <div class="settings-section">
            <div class="settings-section-title">🔑 編集権限の管理</div>
            <p style="font-size:12px; color:rgba(255,255,255,0.4); margin-bottom:12px">ONにしたスタッフは両アプリで編集・削除が可能になります</p>
            <div v-for="s in allStaff" :key="s.id" class="staff-row">
              <div class="staff-avatar" :style="{ background: s.color }">{{ s.name.charAt(0) }}</div>
              <span class="staff-name">{{ s.name }}</span>
              <span v-if="s.id === currentAdminId" class="self-tag">操作中</span>
              <label class="toggle">
                <input
                  type="checkbox"
                  :checked="s.is_admin"
                  :disabled="s.id === currentAdminId"
                  @change="toggleAdmin(s)"
                />
                <span class="toggle-slider"></span>
              </label>
            </div>
            <p style="font-size:11px; color:rgba(255,255,255,0.3); margin-top:10px">⚠️ 操作中のアカウントは変更できません</p>
          </div>

          <!-- パスワード変更 -->
          <div class="settings-section">
            <div class="settings-section-title">🔐 アプリパスワードの変更</div>
            <p style="font-size:12px; color:rgba(255,255,255,0.4); margin-bottom:10px">変更すると全スタッフが次回アクセス時に再入力が必要になります</p>
            <div class="pwd-change-group">
              <input type="password" v-model="pwdChange.input" class="pwd-change-input" placeholder="新しいパスワード" />
              <input type="password" v-model="pwdChange.confirm" class="pwd-change-input" placeholder="確認（もう一度入力）" />
              <div v-if="pwdChange.error" class="msg-error">{{ pwdChange.error }}</div>
              <div v-if="pwdChange.success" class="msg-success">✅ パスワードを変更しました</div>
              <button class="pwd-change-btn" @click="savePassword" :disabled="pwdChange.saving">
                {{ pwdChange.saving ? '保存中...' : '🔒 パスワードを変更する' }}
              </button>
            </div>
          </div>
        </template>

      </template>
    </div>
  </div>

</div>

<script>
const { createClient } = supabase;
const db = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
const { createApp } = Vue;

createApp({
  data() {
    return {
      showModal: false,
      appPassword: '',
      adminPassword: '',
      authenticated: false,
      pwdInput: '',
      pwdError: false,
      loadingStaff: false,
      allStaff: [],
      currentAdminId: null,
      pwdChange: { input: '', confirm: '', saving: false, error: '', success: false },
    };
  },

  async mounted() {
    const [{ data: appPwd }, { data: adminPwd }] = await Promise.all([
      db.from('settings').select('value').eq('key', 'app_password').single(),
      db.from('settings').select('value').eq('key', 'admin_password').single(),
    ]);
    this.appPassword   = appPwd?.value   || '';
    this.adminPassword = adminPwd?.value || '';
    const storedAdminAuth = localStorage.getItem('admin_auth');
    if (storedAdminAuth && storedAdminAuth === this.adminPassword) {
      this.authenticated = true;
      const saved = localStorage.getItem('incident_staff');
      if (saved) {
        try { this.currentAdminId = JSON.parse(saved).id; } catch {}
      }
    }
  },

  methods: {
    async openSettings() {
      this.showModal = true;
      if (this.authenticated) {
        await this.loadStaff();
      }
    },

    closeModal() {
      this.showModal = false;
      this.pwdInput = '';
      this.pwdError = false;
    },

    async checkPassword() {
      if (!this.pwdInput) return;
      if (this.pwdInput === this.adminPassword) {
        localStorage.setItem('admin_auth', this.adminPassword);
        this.authenticated = true;
        this.pwdError = false;
        this.pwdInput = '';
        const saved = localStorage.getItem('incident_staff');
        if (saved) {
          try { this.currentAdminId = JSON.parse(saved).id; } catch {}
        }
        await this.loadStaff();
      } else {
        this.pwdError = true;
        this.pwdInput = '';
      }
    },

    async loadStaff() {
      this.loadingStaff = true;
      const { data } = await db.from('staff').select('*').eq('active', true).order('name');
      this.allStaff = data || [];
      this.loadingStaff = false;
    },

    async toggleAdmin(staff) {
      const newVal = !staff.is_admin;
      const action = newVal ? '編集権限を付与' : '編集権限を削除';
      if (!confirm(`「${staff.name}」に${action}しますか？`)) {
        await this.loadStaff();
        return;
      }
      const { error } = await db.from('staff').update({ is_admin: newVal }).eq('id', staff.id);
      if (error) {
        alert('更新エラー: ' + error.message);
      } else {
        staff.is_admin = newVal;
      }
    },

    async savePassword() {
      this.pwdChange.error = '';
      if (!this.pwdChange.input) { this.pwdChange.error = 'パスワードを入力してください'; return; }
      if (this.pwdChange.input !== this.pwdChange.confirm) { this.pwdChange.error = 'パスワードが一致しません'; return; }
      this.pwdChange.saving = true;
      try {
        const { error } = await db.from('settings').update({ value: this.pwdChange.input }).eq('key', 'app_password');
        if (error) throw error;
        this.appPassword = this.pwdChange.input;
        localStorage.setItem('app_auth', this.appPassword);
        this.pwdChange.input = '';
        this.pwdChange.confirm = '';
        this.pwdChange.success = true;
        setTimeout(() => { this.pwdChange.success = false; }, 3000);
      } catch (e) {
        this.pwdChange.error = '保存エラー: ' + e.message;
      } finally {
        this.pwdChange.saving = false;
      }
    },
  },
}).mount('#app');
</script>
</body>
</html>
