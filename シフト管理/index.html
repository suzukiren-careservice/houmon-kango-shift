<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>訪問看護ステーション シフト管理</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
<div id="app">

  <!-- ========== ローディング ========== -->
  <div v-if="loading" class="loading-overlay">
    <div class="loading-spinner"></div>
    <p class="loading-text">読み込み中...</p>
  </div>

  <!-- ========== パスワード画面 ========== -->
  <div v-else-if="!appAuthenticated" class="pwd-screen">
    <div class="pwd-card">
      <div class="pwd-icon">📅</div>
      <h1 class="pwd-title">シフト管理</h1>
      <p class="pwd-sub">訪問看護ステーション</p>
      <div class="pwd-form">
        <input
          type="password"
          v-model="pwdInput"
          class="pwd-input"
          placeholder="パスワードを入力"
          @keyup.enter="checkPassword"
          autocomplete="current-password"
        />
        <div v-if="pwdError" class="pwd-error-msg">パスワードが違います</div>
        <button class="pwd-btn" @click="checkPassword">ログイン</button>
      </div>
    </div>
  </div>

  <!-- ========== スタッフ選択画面 ========== -->
  <div v-else-if="!currentStaff" class="pwd-screen">
    <div class="pwd-card staff-select-card">
      <div class="pwd-icon">👤</div>
      <h1 class="pwd-title">シフト管理</h1>
      <p class="pwd-sub">あなたは誰ですか？</p>
      <div class="staff-select-list">
        <button
          v-for="s in staffList.filter(s => s.active)"
          :key="s.id"
          class="staff-select-item"
          :style="{ '--c': s.color }"
          @click="selectStaff(s)"
        >
          <span class="staff-select-avatar" :style="{ background: s.color }">{{ s.name.charAt(0) }}</span>
          <span>{{ s.name }}</span>
          <span v-if="s.is_admin" class="staff-admin-tag">管理者</span>
        </button>
      </div>
    </div>
  </div>

  <!-- ========== メインアプリ ========== -->
  <template v-else>

  <!-- ========== HEADER ========== -->
  <header class="app-header no-print">
    <div class="header-left">
      <a href="../index.html" class="back-btn">‹ 戻る</a>
      <h1 class="app-title">訪問看護 シフト管理</h1>
    </div>
    <nav class="header-nav">
      <button
        v-for="tab in tabs"
        :key="tab.id"
        class="nav-btn"
        :class="{ active: currentTab === tab.id }"
        @click="currentTab = tab.id"
      >{{ tab.label }}</button>
    </nav>
    <div class="header-user-area">
      <span class="header-user-dot" :style="{ background: currentStaff.color }"></span>
      <span class="header-user-name">{{ currentStaff.name }}</span>
      <span v-if="isAdmin" class="header-admin-badge">管理者</span>
      <button class="header-change-btn" @click="logoutStaff">変更</button>
    </div>
  </header>

  <!-- ========== WEEKLY SCHEDULE VIEW ========== -->
  <main v-if="currentTab === 'schedule'" class="view-schedule no-print">

    <!-- Week navigation -->
    <div class="week-nav">
      <button class="btn btn-secondary" @click="prevWeek">&#9664; 前週</button>
      <button class="btn btn-secondary" @click="goToday">今週</button>
      <span class="week-label">{{ weekLabel }}</span>
      <button class="btn btn-secondary" @click="nextWeek">次週 &#9654;</button>
      <button class="btn btn-secondary print-btn" @click="printSchedule">&#128438; 印刷</button>
    </div>

    <!-- Grid wrapper for both-direction scroll -->
    <div class="grid-wrapper">
      <table class="schedule-table">
        <thead>
          <tr>
            <th class="corner-cell sticky-col sticky-row">スタッフ</th>
            <th
              v-for="day in weekDays"
              :key="day.dateStr"
              class="day-header sticky-row"
              :class="{ 'today-col': day.isToday, 'weekend-col': day.isWeekend }"
            >
              <div class="day-header-inner">
                <span class="day-name">{{ day.dayName }}</span>
                <span class="day-date">{{ day.shortDate }}</span>
              </div>
            </th>
          </tr>
        </thead>
        <tbody>
          <tr v-for="(staff, slotIdx) in staffSlots" :key="staff.isEmpty ? 'empty-' + slotIdx : staff.id" :class="{ 'empty-staff-row': staff.isEmpty }">
            <td class="staff-cell sticky-col" :class="{ 'empty-staff-cell': staff.isEmpty }">
              <template v-if="!staff.isEmpty">
                <div class="staff-name-wrapper">
                  <span class="staff-color-dot" :style="{ backgroundColor: staff.color }"></span>
                  <span class="staff-name-text">{{ staff.name }}</span>
                </div>
              </template>
              <div v-else-if="isAdmin" class="empty-staff-placeholder" @click="openAddStaff">＋ 登録</div>
            </td>
            <td
              v-for="day in weekDays"
              :key="day.dateStr"
              class="schedule-cell"
              :class="{ 'today-col': day.isToday, 'weekend-col': day.isWeekend, 'empty-slot-day': staff.isEmpty }"
            >
              <template v-if="!staff.isEmpty">
              <!-- Morning block -->
              <div
                class="period-block period-morning"
                :class="{ 'period-off': !getShift(staff.id, day.dateStr).morning }"
              >
                <div class="period-header">
                  <span class="period-label">午前</span>
                  <button
                    v-if="isAdmin"
                    class="shift-toggle"
                    :class="getShift(staff.id, day.dateStr).morning ? 'toggle-on' : 'toggle-off'"
                    @click="toggleShift(staff.id, day.dateStr, 'morning')"
                  >{{ getShift(staff.id, day.dateStr).morning ? '出勤' : '休み' }}</button>
                  <span v-else class="shift-label-readonly">{{ getShift(staff.id, day.dateStr).morning ? '出勤' : '休み' }}</span>
                </div>
                <div v-if="getShift(staff.id, day.dateStr).morning" class="visit-list">
                  <div
                    v-for="visit in getVisits(staff.id, day.dateStr, 'morning')"
                    :key="visit.id"
                    class="visit-card"
                    :style="{ borderLeftColor: staff.color }"
                    @click="isAdmin ? openEditVisit(visit) : null"
                  >
                    <div class="visit-header-line">
                      <span v-if="visit.startTime || visit.endTime" class="visit-time">{{ visit.startTime || '?' }}〜{{ visit.endTime || '?' }}</span>
                      <span class="visit-client">{{ getClientName(visit.clientId) }}</span>
                    </div>
                    <div v-if="visit.location" class="visit-location">{{ visit.location }}</div>
                    <div v-if="visit.notes" class="visit-notes">{{ visit.notes }}</div>
                    <div v-if="hasCrossConflict(visit.clientId, day.dateStr)" class="cross-conflict-badge">⚠ {{ otherTeamLabel }}も訪問</div>
                  </div>
                  <button
                    v-if="isAdmin"
                    class="add-visit-btn"
                    @click="openAddVisit(staff.id, day.dateStr, 'morning')"
                  >＋</button>
                </div>
              </div>

              <!-- Afternoon block -->
              <div
                class="period-block period-afternoon"
                :class="{ 'period-off': !getShift(staff.id, day.dateStr).afternoon }"
              >
                <div class="period-header">
                  <span class="period-label">午後</span>
                  <button
                    v-if="isAdmin"
                    class="shift-toggle"
                    :class="getShift(staff.id, day.dateStr).afternoon ? 'toggle-on' : 'toggle-off'"
                    @click="toggleShift(staff.id, day.dateStr, 'afternoon')"
                  >{{ getShift(staff.id, day.dateStr).afternoon ? '出勤' : '休み' }}</button>
                  <span v-else class="shift-label-readonly">{{ getShift(staff.id, day.dateStr).afternoon ? '出勤' : '休み' }}</span>
                </div>
                <div v-if="getShift(staff.id, day.dateStr).afternoon" class="visit-list">
                  <div
                    v-for="visit in getVisits(staff.id, day.dateStr, 'afternoon')"
                    :key="visit.id"
                    class="visit-card"
                    :style="{ borderLeftColor: staff.color }"
                    @click="isAdmin ? openEditVisit(visit) : null"
                  >
                    <div class="visit-header-line">
                      <span v-if="visit.startTime || visit.endTime" class="visit-time">{{ visit.startTime || '?' }}〜{{ visit.endTime || '?' }}</span>
                      <span class="visit-client">{{ getClientName(visit.clientId) }}</span>
                    </div>
                    <div v-if="visit.location" class="visit-location">{{ visit.location }}</div>
                    <div v-if="visit.notes" class="visit-notes">{{ visit.notes }}</div>
                    <div v-if="hasCrossConflict(visit.clientId, day.dateStr)" class="cross-conflict-badge">⚠ {{ otherTeamLabel }}も訪問</div>
                  </div>
                  <button
                    v-if="isAdmin"
                    class="add-visit-btn"
                    @click="openAddVisit(staff.id, day.dateStr, 'afternoon')"
                  >＋</button>
                </div>
              </div>
              </template>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </main>

  <!-- ========== CLIENT VIEW ========== -->
  <main v-if="currentTab === 'clientview'" class="view-clientview no-print">

    <!-- 週ナビ -->
    <div class="week-nav">
      <button class="btn btn-secondary" @click="prevWeek">&#9664; 前週</button>
      <button class="btn btn-secondary" @click="goToday">今週</button>
      <span class="week-label">{{ weekLabel }}</span>
      <button class="btn btn-secondary" @click="nextWeek">次週 &#9654;</button>
    </div>

    <!-- 期間タブ＋フィルター -->
    <div class="cv-toolbar">
      <div class="cv-period-tabs">
        <button class="cv-period-tab" :class="{ on: clientViewPeriod==='week' }"     @click="clientViewPeriod='week'">📅 週次・1日複数回</button>
        <button class="cv-period-tab" :class="{ on: clientViewPeriod==='longterm' }" @click="clientViewPeriod='longterm'">📆 月次・長期（月1回〜）</button>
      </div>
      <div class="cv-filters" style="margin-top:8px">
        <button class="cv-chip" :class="{ on: clientViewFilter==='all' }"  @click="clientViewFilter='all'">全員</button>
        <button class="cv-chip" v-if="clientViewPeriod==='week'" :class="{ on: clientViewFilter==='active' }" @click="clientViewFilter='active'">今週訪問あり</button>
        <button class="cv-chip warn" :class="{ on: clientViewFilter==='warn' }" @click="clientViewFilter='warn'">
          ⚠ 要確認{{ clientViewWarnCount > 0 ? `（${clientViewWarnCount}名）` : '' }}
        </button>
      </div>
    </div>

    <!-- 週次テーブル -->
    <div v-if="clientViewPeriod==='week'" class="cv-table-wrap">
      <table class="cv-table">
        <thead>
          <tr>
            <th class="cv-name-col">利用者</th>
            <th v-for="day in weekDays" :key="day.dateStr"
              :class="['cv-day-col', { 'cv-today': day.isToday, 'cv-weekend': day.isWeekend }]">
              {{ ['日','月','火','水','木','金','土'][new Date(day.dateStr+'T00:00:00').getDay()] }}<br>
              <span class="cv-date">{{ day.shortDate }}</span>
            </th>
            <th class="cv-freq-col">今週</th>
          </tr>
        </thead>
        <tbody>
          <tr v-for="row in clientViewRows" :key="row.client.id" :class="{ 'cv-warn-row': row.status==='warn' }">
            <td class="cv-name-cell">{{ row.client.name }}</td>
            <td v-for="day in row.days" :key="day.dateStr" :class="['cv-cell', { 'cv-today': day.isToday }]">
              <div v-if="day.visits.length" class="cv-visits">
                <span v-for="v in day.visits" :key="v.id" class="cv-badge" :style="{ background: v.staffColor }">
                  {{ v.staffName }}<span class="cv-period">{{ v.period==='morning' ? '午前' : '午後' }}</span>
                </span>
              </div>
              <div v-else class="cv-empty"></div>
              <!-- 1日複数回：日ごとのカウントバッジ -->
              <div v-if="row.client.freqType === 'daily' && row.client.weeklyVisits"
                   class="cv-day-count" :class="day.dayStatus">
                {{ day.dayCount }}/{{ row.client.weeklyVisits }}回
              </div>
            </td>
            <td class="cv-freq-cell">
              <template v-if="row.client.onHold">
                <span class="cv-freq-badge hold">⏸ 停止中</span>
              </template>
              <template v-else-if="row.client.freqType === 'daily'">
                <span class="cv-freq-badge" :class="row.status">1日{{ row.expected || '?' }}回</span>
              </template>
              <template v-else>
                <span v-if="row.expected" class="cv-freq-badge" :class="row.status">{{ row.weekCount }}/週{{ row.expected }}</span>
                <span v-else class="cv-freq-badge none">{{ row.weekCount }}回</span>
              </template>
            </td>
          </tr>
          <tr v-if="clientViewRows.length === 0">
            <td :colspan="9" style="text-align:center;padding:32px;color:#94A3B8;font-size:13px">
              週次の利用者が登録されていません
            </td>
          </tr>
        </tbody>
      </table>
    </div>

    <!-- 月次・長期テーブル -->
    <div v-if="clientViewPeriod==='longterm'" class="cv-table-wrap">
      <table class="cv-table">
        <thead>
          <tr>
            <th class="cv-name-col">利用者</th>
            <th style="text-align:center">頻度</th>
            <th style="text-align:center">前回訪問日</th>
            <th style="text-align:center">次回目安</th>
            <th class="cv-freq-col">状況</th>
          </tr>
        </thead>
        <tbody>
          <tr v-for="row in clientViewLongtermRows" :key="row.client.id" :class="{ 'cv-warn-row': row.status==='warn' }">
            <td class="cv-name-cell">{{ row.client.name }}</td>
            <td style="text-align:center;font-size:12px;color:#64748B">
              {{ row.client.freqType==='month' ? '月次' : row.client.freqType==='bimonth' ? '2ヶ月に1回' : '3ヶ月に1回' }}
            </td>
            <td style="text-align:center;font-size:12px;color:#64748B">
              {{ row.lastVisitDate ? formatDateJp(row.lastVisitDate) : '―' }}
            </td>
            <td style="text-align:center;font-size:12px;color:#64748B">
              <template v-if="row.client.freqType==='month'">今月中</template>
              <template v-else>{{ row.nextDueDateStr ? formatDateJp(row.nextDueDateStr) : '―' }}</template>
            </td>
            <td class="cv-freq-cell">
              <template v-if="row.client.onHold">
                <span class="cv-freq-badge hold">⏸ 停止中</span>
              </template>
              <!-- 月次：今月の訪問回数 -->
              <template v-else-if="row.client.freqType==='month'">
                <span v-if="row.expected" class="cv-freq-badge" :class="row.status">{{ row.visitCount }}/{{ row.expected }}回</span>
                <span v-else class="cv-freq-badge none">{{ row.visitCount }}回</span>
              </template>
              <!-- 2・3ヶ月：期限ベース -->
              <template v-else>
                <span class="cv-freq-badge" :class="row.status">
                  {{ row.status==='ok' ? '期限内' : row.lastVisitDate ? '期限超過' : '未記録' }}
                </span>
              </template>
            </td>
          </tr>
          <tr v-if="clientViewLongtermRows.length === 0">
            <td colspan="5" style="text-align:center;padding:32px;color:#94A3B8;font-size:13px">
              月次・長期の利用者が登録されていません
            </td>
          </tr>
        </tbody>
      </table>
    </div>

    <!-- 凡例 -->
    <div class="cv-legend">
      <span v-for="s in activeStaff" :key="s.id" class="cv-legend-item">
        <span class="cv-legend-dot" :style="{ background: s.color }"></span>{{ s.name }}
      </span>
      <span style="margin-left:auto;display:flex;gap:10px">
        <span class="cv-legend-item"><span class="cv-freq-badge ok" style="font-size:10px">✓</span> 予定通り</span>
        <span class="cv-legend-item"><span class="cv-freq-badge warn" style="font-size:10px">!</span> 要確認</span>
      </span>
    </div>
  </main>

  <!-- ========== STAFF MANAGEMENT VIEW ========== -->
  <!-- ========== CLIENT MANAGEMENT VIEW ========== -->
  <main v-if="currentTab === 'clients'" class="view-manage no-print">
    <div class="manage-header">
      <h2>利用者管理</h2>
      <button v-if="isAdmin" class="btn btn-primary" @click="openAddClient">＋ 利用者追加</button>
    </div>
    <div class="manage-list">
      <div v-for="client in clientList" :key="client.id" class="manage-item client-item" :class="{ 'client-on-hold': client.onHold }">
        <div class="client-info">
          <div style="display:flex;align-items:center;gap:8px">
            <span class="manage-item-name">{{ client.name }}</span>
            <span v-if="client.onHold" class="hold-badge">⏸ 停止中</span>
          </div>
          <span v-if="client.address" class="client-address">{{ client.address }}</span>
          <span v-if="client.notes" class="client-notes-preview">{{ client.notes }}</span>
        </div>
        <div v-if="isAdmin" class="manage-item-actions">
          <button class="btn btn-edit" @click="openEditClient(client)">編集</button>
          <button class="btn btn-danger" @click="deleteClient(client)">削除</button>
        </div>
      </div>
      <p v-if="clientList.length === 0" class="empty-msg">利用者が登録されていません</p>
    </div>
  </main>

  <!-- ========== PRINT VIEW (hidden on screen) ========== -->
  <div class="print-only" id="print-area">
    <div class="print-title">訪問看護週間スケジュール ― {{ weekLabel }}</div>
    <table class="print-table">
      <thead>
        <tr>
          <th class="print-staff-col">スタッフ</th>
          <th v-for="day in weekDays" :key="day.dateStr" class="print-day-col">
            {{ day.dayName }}<br/>{{ day.shortDate }}
          </th>
        </tr>
      </thead>
      <tbody>
        <tr v-for="staff in activeStaff" :key="staff.id">
          <td class="print-staff-name">{{ staff.name }}</td>
          <td v-for="day in weekDays" :key="day.dateStr" class="print-cell">
            <div class="print-period">
              <div class="print-period-label">午前</div>
              <template v-if="getShift(staff.id, day.dateStr).morning">
                <div
                  v-for="visit in getVisits(staff.id, day.dateStr, 'morning')"
                  :key="visit.id"
                  class="print-visit"
                >
                  <span v-if="visit.startTime || visit.endTime" class="print-time">{{ visit.startTime || '?' }}〜{{ visit.endTime || '?' }} </span><strong>{{ getClientName(visit.clientId) }}</strong>
                </div>
                <div v-if="getVisits(staff.id, day.dateStr, 'morning').length === 0" class="print-empty">―</div>
              </template>
              <div v-else class="print-off">休み</div>
            </div>
            <div class="print-period">
              <div class="print-period-label">午後</div>
              <template v-if="getShift(staff.id, day.dateStr).afternoon">
                <div
                  v-for="visit in getVisits(staff.id, day.dateStr, 'afternoon')"
                  :key="visit.id"
                  class="print-visit"
                >
                  <span v-if="visit.startTime || visit.endTime" class="print-time">{{ visit.startTime || '?' }}〜{{ visit.endTime || '?' }} </span><strong>{{ getClientName(visit.clientId) }}</strong>
                </div>
                <div v-if="getVisits(staff.id, day.dateStr, 'afternoon').length === 0" class="print-empty">―</div>
              </template>
              <div v-else class="print-off">休み</div>
            </div>
          </td>
        </tr>
      </tbody>
    </table>
  </div>

  <!-- ========== VISIT MODAL ========== -->
  <div v-if="visitModal.show" class="modal-overlay" @click.self="closeVisitModal">
    <div class="modal">
      <div class="modal-header">
        <h3>
          {{ visitModal.staffName }} ―
          {{ visitModal.dateLabel }} ―
          {{ visitModal.period === 'morning' ? '午前' : '午後' }}
        </h3>
        <button class="modal-close" @click="closeVisitModal">✕</button>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label>利用者 <span class="required">*</span></label>
          <select v-model="visitModal.clientId" @change="onVisitClientChange" class="form-select">
            <option value="">― 選択してください ―</option>
            <option v-for="c in clientList" :key="c.id" :value="c.id">{{ c.name }}</option>
          </select>
        </div>
        <div v-if="visitModal.clientNotes" class="client-notes-ref">
          <span class="notes-ref-label">特記事項（利用者情報）：</span>
          <span class="notes-ref-text">{{ visitModal.clientNotes }}</span>
        </div>
        <div class="form-group">
          <label>場所・住所</label>
          <input type="text" v-model="visitModal.location" class="form-input" placeholder="住所を入力" />
        </div>
        <div class="form-group">
          <label>訪問時刻</label>
          <div style="display:flex; align-items:center; gap:8px;">
            <select v-model="visitModal.startTime" class="form-select" style="flex:1;">
              <option value="">― 開始未設定 ―</option>
              <option v-for="t in currentTimeOptions" :key="t" :value="t">{{ t }}</option>
            </select>
            <span style="color:#64748B; font-size:14px; flex-shrink:0;">〜</span>
            <select v-model="visitModal.endTime" class="form-select" style="flex:1;">
              <option value="">― 終了未設定 ―</option>
              <option v-for="t in currentTimeOptions" :key="t" :value="t">{{ t }}</option>
            </select>
          </div>
        </div>
        <div class="form-group">
          <label>訪問特記事項</label>
          <textarea v-model="visitModal.notes" class="form-textarea" rows="3" placeholder="この訪問に関するメモ"></textarea>
        </div>
      </div>
      <div class="modal-footer">
        <button v-if="visitModal.isEdit" class="btn btn-danger" @click="deleteVisit">削除</button>
        <div class="modal-footer-right">
          <button class="btn btn-cancel" @click="closeVisitModal">キャンセル</button>
          <button class="btn btn-primary" @click="saveVisit">保存</button>
        </div>
      </div>
    </div>
  </div>

  <!-- ========== STAFF MODAL ========== -->
  <div v-if="staffModal.show" class="modal-overlay" @click.self="closeStaffModal">
    <div class="modal">
      <div class="modal-header">
        <h3>{{ staffModal.isEdit ? 'スタッフ編集' : 'スタッフ追加' }}</h3>
        <button class="modal-close" @click="closeStaffModal">✕</button>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label>名前 <span class="required">*</span></label>
          <input type="text" v-model="staffModal.name" class="form-input" placeholder="スタッフ名" />
        </div>
        <div class="form-group">
          <label>カラー</label>
          <div class="color-swatches">
            <button
              v-for="color in colorOptions"
              :key="color"
              class="color-swatch"
              :class="{ selected: staffModal.color === color }"
              :style="{ backgroundColor: color }"
              @click="staffModal.color = color"
            ></button>
          </div>
        </div>
        <div class="form-group">
          <label>ステータス</label>
          <div class="toggle-row">
            <button
              class="btn"
              :class="staffModal.active ? 'btn-primary' : 'btn-cancel'"
              @click="staffModal.active = !staffModal.active"
            >{{ staffModal.active ? '稼働中' : '非稼働' }}</button>
          </div>
        </div>
      </div>
      <div class="modal-footer">
        <div></div>
        <div class="modal-footer-right">
          <button class="btn btn-cancel" @click="closeStaffModal">キャンセル</button>
          <button class="btn btn-primary" @click="saveStaff">保存</button>
        </div>
      </div>
    </div>
  </div>

  <!-- ========== CLIENT MODAL ========== -->
  <div v-if="clientModal.show" class="modal-overlay" @click.self="closeClientModal">
    <div class="modal">
      <div class="modal-header">
        <h3>{{ clientModal.isEdit ? '利用者編集' : '利用者追加' }}</h3>
        <button class="modal-close" @click="closeClientModal">✕</button>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label>利用者名 <span class="required">*</span></label>
          <input type="text" v-model="clientModal.name" class="form-input" placeholder="氏名" />
        </div>
        <div class="form-group">
          <label>住所</label>
          <input type="text" v-model="clientModal.address" class="form-input" placeholder="住所" />
        </div>
        <div class="form-group">
          <label>特記事項（永続）</label>
          <textarea v-model="clientModal.notes" class="form-textarea" rows="4" placeholder="注意事項、処置内容など"></textarea>
        </div>
        <div class="form-group">
          <label>訪問頻度（利用者確認ビュー用）</label>
          <!-- 訪問ストップ -->
          <div class="form-group" style="margin-bottom:12px">
            <button
              type="button"
              class="btn"
              :class="clientModal.onHold ? 'btn-danger' : 'btn-cancel'"
              style="width:100%;font-size:14px;padding:10px"
              @click="clientModal.onHold = !clientModal.onHold"
            >
              {{ clientModal.onHold ? '🔴 訪問ストップ中（タップで解除）' : '⏸ 訪問ストップ（DS・入院など）' }}
            </button>
          </div>

          <select v-model="clientModal.freqType" class="form-input" style="margin-bottom:8px">
            <option value="week">週次（毎週）</option>
            <option value="daily">1日複数回（毎日）</option>
            <option value="month">月次（毎月）</option>
            <option value="bimonth">長期（2ヶ月に1回）</option>
            <option value="quarter">長期（3ヶ月に1回）</option>
          </select>
          <select v-if="clientModal.freqType !== 'bimonth' && clientModal.freqType !== 'quarter'"
                  v-model="clientModal.weeklyVisits" class="form-input">
            <option :value="null">回数：未設定</option>
            <option v-for="n in (clientModal.freqType==='week' ? [1,2,3,4,5,6,7] : clientModal.freqType==='daily' ? [2,3,4] : [1,2,3,4])" :key="n" :value="n">
              {{ clientModal.freqType==='week' ? `週${n}回` : clientModal.freqType==='daily' ? `1日${n}回` : `月${n}回` }}
            </option>
          </select>
        </div>
      </div>
      <div class="modal-footer">
        <div></div>
        <div class="modal-footer-right">
          <button class="btn btn-cancel" @click="closeClientModal">キャンセル</button>
          <button class="btn btn-primary" @click="saveClient">保存</button>
        </div>
      </div>
    </div>
  </div>

</div>

  </template><!-- end v-else (main app) -->

</div>

<script src="../config.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
<script src="app.js"></script>
</body>
</html>
